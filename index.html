<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trimix Blender</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <style>
        .app-header { background: #0a3d5c; color: #fff; padding: 1rem 0; margin-bottom: 1.5rem; }
        .app-header small { color: #a8d4e8; }
    </style>
</head>

<body>
    <header class="app-header">
        <div class="container">
            <h1 class="h4 mb-0">Trimix Blender</h1>
            <small>Fill sequence calculator for technical diving</small>
        </div>
    </header>

    <div class="container">
<div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase text-muted small mb-3">Start Mix</h6>
                        <div class="mb-3">
                            <label for="start_bar" class="form-label">Bar</label>
                            <input type="number" class="form-control" id="start_bar" name="start_bar" min="1" max="300" value="120">
                        </div>
                        <div class="mb-3">
                            <label for="start_o2" class="form-label">O2 %</label>
                            <input type="number" class="form-control" id="start_o2" name="start_o2" min="0" max="100" value="22">
                        </div>
                        <div class="mb-0">
                            <label for="start_he" class="form-label">He %</label>
                            <input type="number" class="form-control" id="start_he" name="start_he" min="0" max="100" value="50">
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase text-muted small mb-3">Target Mix</h6>
                        <div class="mb-3">
                            <label for="finish_bar" class="form-label">Bar</label>
                            <input type="number" class="form-control" id="finish_bar" name="finish_bar" min="1" max="300" value="250">
                        </div>
                        <div class="mb-3">
                            <label for="finish_o2" class="form-label">O2 %</label>
                            <input type="number" class="form-control" id="finish_o2" name="finish_o2" min="0" max="100" value="18">
                        </div>
                        <div class="mb-0">
                            <label for="finish_he" class="form-label">He %</label>
                            <input type="number" class="form-control" id="finish_he" name="finish_he" min="0" max="100" value="40">
                        </div>
                    </div>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card h-100">
                    <div class="card-body">
                        <h6 class="card-title text-uppercase text-muted small mb-3">Helium Bank</h6>
                        <div class="mb-3">
                            <label for="helium_bar" class="form-label">Bar</label>
                            <input type="number" class="form-control" id="helium_bar" name="helium_bar" min="1" max="300" value="250">
                        </div>
                        <div class="mb-3">
                            <label for="helium_o2" class="form-label">O2 %</label>
                            <input type="number" class="form-control" id="helium_o2" name="helium_o2" min="0" max="100" value="0">
                        </div>
                        <div class="mb-0">
                            <label for="helium_he" class="form-label">He %</label>
                            <input type="number" class="form-control" id="helium_he" name="helium_he" min="0" max="100" value="100">
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <div class="row mb-4">
            <div class="col-md-4">
                <label for="depth_m" class="form-label">Planned Depth (m)</label>
                <input type="number" class="form-control" id="depth_m" name="depth_m" min="1" max="350" value="40">
            </div>
        </div>

        <div class="mb-4">
            <button id="btnCalculate" class="btn btn-primary">Calculate</button>
        </div>

        <div id="error" class="alert alert-danger d-none" role="alert"></div>
        <div id="result"></div>
    </div>

    <script>
        const LOCAL_URL = 'http://localhost:7071/api/TrimixBlend';
        const PROD_URL  = 'https://gasblender-tcif7s.azurewebsites.net/api/TrimixBlend';

        document.addEventListener('DOMContentLoaded', function () {
            document.getElementById('btnCalculate').addEventListener('click', handleCalculate);
        });

        function handleCalculate() {
            const btn      = document.getElementById('btnCalculate');
            const errorEl  = document.getElementById('error');
            const resultEl = document.getElementById('result');

            errorEl.classList.add('d-none');
            errorEl.textContent = '';
            resultEl.innerHTML = '';

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>Calculating...';

            const int = (id) => parseInt(document.getElementById(id).value, 10);
            const payload = JSON.stringify({
                start_bar:  int('start_bar'),
                start_o2:   int('start_o2'),
                start_he:   int('start_he'),
                finish_bar: int('finish_bar'),
                finish_o2:  int('finish_o2'),
                finish_he:  int('finish_he'),
                helium_bar: int('helium_bar'),
                helium_o2:  int('helium_o2'),
                helium_he:  int('helium_he'),
                depth_m:    int('depth_m')
            });

            const h = window.location.hostname;
            const url = (h === 'localhost' || h === '127.0.0.1' || h === '') ? LOCAL_URL : PROD_URL;

            fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: payload
            })
            .then(function (response) {
                if (!response.ok) {
                    return response.text().then(function (text) { throw new Error(text || response.statusText); });
                }
                return response.json();
            })
            .then(function (data) {
                resultEl.innerHTML = buildAnalysis(data.analysis, int('depth_m')) + buildResultTable(data);
            })
            .catch(function (err) {
                errorEl.textContent = err.message;
                errorEl.classList.remove('d-none');
            })
            .finally(function () {
                btn.disabled = false;
                btn.innerHTML = 'Calculate';
            });
        }

        function buildAnalysis(analysis, depth_m) {
            var densityHtml = '';
            if (analysis.gas_density !== undefined) {
                var statusMap = {
                    safe:    { cls: 'bg-success',              label: 'Safe' },
                    caution: { cls: 'bg-warning text-dark',    label: 'Elevated risk' },
                    danger:  { cls: 'bg-danger',               label: 'Exceeds upper limit' }
                };
                var s = statusMap[analysis.gas_density_status];
                densityHtml = '<div class="col-sm-auto">'
                    + '<div class="small text-muted">Gas Density at ' + depth_m + ' m</div>'
                    + '<div><span class="badge ' + s.cls + '">' + analysis.gas_density + ' g/L — ' + s.label + '</span></div>'
                    + '</div>';
            }
            return '<div class="row g-3 mb-3">'
                + '<div class="col-sm-auto">'
                + '<div class="small text-muted">MOD (ppO₂ 1.4)</div>'
                + '<div class="fw-semibold">' + analysis.mod_1_4 + ' m</div>'
                + '</div>'
                + '<div class="col-sm-auto">'
                + '<div class="small text-muted">MOD (ppO₂ 1.6)</div>'
                + '<div class="fw-semibold">' + analysis.mod_1_6 + ' m</div>'
                + '</div>'
                + densityHtml
                + '</div>';
        }

        function buildResultTable(data) {
            var rows = '';
            data.steps.forEach(function (step) {
                var diff = Math.round((step.result_gas.bar - step.start_gas.bar) * 100) / 100;
                var sign = diff >= 0 ? '+' : '';
                rows += '<tr>'
                    + '<td>' + step.name + '</td>'
                    + '<td>' + step.start_gas.bar + '</td>'
                    + '<td>' + step.result_gas.bar + ' <span class="text-muted">(' + sign + diff + ')</span></td>'
                    + '<td>' + step.result_gas.o2 + '/' + step.result_gas.he + '</td>'
                    + '</tr>';
            });
            return '<h6 class="mt-2 mb-2">Fill Sequence</h6>'
                + '<table class="table table-sm table-bordered">'
                + '<thead class="table-dark"><tr><th>Step</th><th>Start (bar)</th><th>Finish (bar)</th><th>Mix (O2/He %)</th></tr></thead>'
                + '<tbody>' + rows + '</tbody>'
                + '</table>';
        }
    </script>
</body>

</html>
