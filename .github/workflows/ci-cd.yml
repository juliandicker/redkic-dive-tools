name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

      - name: Export OpenAPI schema
        run: python -c "import json; from function_app import fastapi_app; open('openapi.json','w').write(json.dumps(fastapi_app.openapi(), indent=2))"

      - name: Upload OpenAPI schema artifact
        uses: actions/upload-artifact@v4
        with:
          name: openapi-schema
          path: openapi.json

  infra:
    name: Deploy Infrastructure
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      storageAccountName: ${{ steps.bicep.outputs.storageAccountName }}
      functionAppName: ${{ steps.bicep.outputs.functionAppName }}
      staticWebAppName: ${{ steps.bicep.outputs.staticWebAppName }}
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: bicep
        run: |
          output=$(az deployment sub create \
            --location northeurope \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --query 'properties.outputs' \
            --output json)
          echo "storageAccountName=$(echo $output | jq -r '.storageAccountName.value')" >> $GITHUB_OUTPUT
          echo "functionAppName=$(echo $output | jq -r '.functionAppName.value')" >> $GITHUB_OUTPUT
          echo "staticWebAppName=$(echo $output | jq -r '.staticWebAppName.value')" >> $GITHUB_OUTPUT

  deploy-function:
    name: Deploy Function App
    needs: infra
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Deploy to Azure Functions
        run: func azure functionapp publish ${{ needs.infra.outputs.functionAppName }} --python

  deploy-website:
    name: Deploy Static Website
    needs: infra
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build frontend
        working-directory: web
        run: npm ci && npm run build

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Get SWA deployment token
        id: swa_token
        run: |
          token=$(az staticwebapp secrets list \
            --name ${{ needs.infra.outputs.staticWebAppName }} \
            --resource-group rg-gasblender-prod \
            --query 'properties.apiKey' -o tsv)
          echo "token=$token" >> $GITHUB_OUTPUT

      - name: Deploy to Static Web App
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ steps.swa_token.outputs.token }}
          action: upload
          app_location: web/dist
          skip_app_build: true
