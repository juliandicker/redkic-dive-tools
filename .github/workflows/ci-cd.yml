name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Run tests
        run: pytest -v

  infra:
    name: Deploy Infrastructure
    needs: test
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    outputs:
      storageAccountName: ${{ steps.bicep.outputs.storageAccountName }}
      functionAppName: ${{ steps.bicep.outputs.functionAppName }}
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy Bicep
        id: bicep
        run: |
          output=$(az deployment sub create \
            --location northeurope \
            --template-file infra/main.bicep \
            --parameters infra/main.bicepparam \
            --query 'properties.outputs' \
            --output json)
          echo "storageAccountName=$(echo $output | jq -r '.storageAccountName.value')" >> $GITHUB_OUTPUT
          echo "functionAppName=$(echo $output | jq -r '.functionAppName.value')" >> $GITHUB_OUTPUT

  deploy-function:
    name: Deploy Function App
    needs: infra
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Azure Functions Core Tools
        run: npm install -g azure-functions-core-tools@4 --unsafe-perm true

      - name: Deploy to Azure Functions
        run: func azure functionapp publish ${{ needs.infra.outputs.functionAppName }} --python

  deploy-website:
    name: Deploy Static Website
    needs: infra
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v6

      - uses: azure/login@v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Enable static website and upload
        env:
          STORAGE_ACCOUNT: ${{ needs.infra.outputs.storageAccountName }}
        run: |
          STORAGE_KEY=$(az storage account keys list \
            --resource-group rg-gasblender-prod \
            --account-name $STORAGE_ACCOUNT \
            --query '[0].value' -o tsv)

          az storage blob service-properties update \
            --account-name $STORAGE_ACCOUNT \
            --static-website \
            --index-document index.html \
            --404-document index.html \
            --account-key $STORAGE_KEY

          az storage blob upload \
            --account-name $STORAGE_ACCOUNT \
            --container-name '$web' \
            --name index.html \
            --file index.html \
            --overwrite \
            --account-key $STORAGE_KEY

          az storage account show \
            --name $STORAGE_ACCOUNT \
            --query 'primaryEndpoints.web' \
            --output tsv
